#cloud-config
# Confidant sandbox VM bootstrap (GPU variant): Docker + NVIDIA driver +
# nvidia-container-toolkit. Used when the bicep 'gpu' parameter is true
# (e.g. Standard_NC8as_T4_v3). Ends with a reboot so the driver loads.
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - ubuntu-drivers-common

runcmd:
  # Docker Engine + compose plugin
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  - usermod -aG docker azureuser
  # NVIDIA GPU driver (server branch picked automatically)
  - ubuntu-drivers install --gpgpu
  # nvidia-container-toolkit so containers can use the GPU
  - curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  - curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' > /etc/apt/sources.list.d/nvidia-container-toolkit.list
  - apt-get update
  - apt-get install -y nvidia-container-toolkit
  - nvidia-ctk runtime configure --runtime=docker
  - systemctl restart docker
  # App directory
  - mkdir -p /opt/confidant
  - chown azureuser:azureuser /opt/confidant

power_state:
  mode: reboot
  message: Rebooting to load NVIDIA driver
  condition: true
