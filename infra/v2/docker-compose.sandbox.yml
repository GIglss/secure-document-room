# Confidant v2 — sandbox VM runtime stack (baked into the gallery image).
#
# Lives at /opt/confidant/docker-compose.sandbox.yml on the image. Everything
# (images, model weights) is pre-baked: a sandbox VM needs ZERO registry pulls
# or model downloads at boot (no internet egress except ACME 80/443).
#
# Per-instance config arrives via cloud-init customData (see sandbox.bicep),
# which writes /opt/confidant/runtime.env with:
#   PUBLIC_HOST             confidant-<id>.westeurope.cloudapp.azure.com
#   SANDBOX_ID              <id>
#   SECRET_KEY              random hex, generated by spawn-sandbox.sh
#   ACS_CONNECTION_STRING   (optional) fetched at spawn time
#   ACS_SENDER_ADDRESS      (optional) DoNotReply@<managed-domain>
#
# confidant.service (systemd, baked+enabled) waits for runtime.env, loads it
# as its EnvironmentFile (so ${PUBLIC_HOST} interpolates below), then runs:
#   docker compose -f /opt/confidant/docker-compose.sandbox.yml up -d
#
# Local smoke test on the build VM: PUBLIC_HOST=localhost -> Caddy serves
# plain HTTP on :80 instead of provisioning Let's Encrypt.

name: confidant

services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    command: >
      -m /models/qwen3-8b-q4_k_m.gguf
      -t 4
      --mlock
      --ctx-size 8192
      --host 0.0.0.0
      --port 8080
      --alias qwen3-8b
    ulimits:
      memlock: -1
    expose:
      - "8080"
    volumes:
      - /opt/confidant/models:/models:ro

  backend:
    image: confidant-backend:sandbox
    build:
      context: /opt/confidant/app/backend
    restart: unless-stopped
    expose:
      - "8000"
    # SECRET_KEY, SANDBOX_ID, ACS_* come straight from the per-instance file.
    env_file:
      - /opt/confidant/runtime.env
    environment:
      DEV_MODE: "false"
      FRONTEND_URL: https://${PUBLIC_HOST:-localhost}
      DATABASE_URL: sqlite:////app/data/secure_room.db
      UPLOAD_DIR: /app/uploads
      CHROMA_DIR: /app/data/chroma
      LLM_PROVIDER: local
      LOCAL_LLM_BASE_URL: http://llamacpp:8080/v1
      LOCAL_LLM_MODEL: qwen3-8b
      # Durable anonymized insights + session lifecycle (VM managed identity).
      AZURE_TABLES_ENDPOINT: https://stconfcorekcrrr5q7kmgj.table.core.windows.net
    volumes:
      - /opt/confidant/data/uploads:/app/uploads
      - /opt/confidant/data/backend:/app/data
    depends_on:
      - llamacpp

  frontend:
    # Built with NEXT_PUBLIC_API_URL="/" -> same-origin relative /api calls
    # (api.ts strips the trailing slash to ""), so one baked image works
    # behind any sandbox FQDN. "" itself would not inline on Next 14.2.
    image: confidant-frontend:sandbox
    build:
      context: /opt/confidant/app/frontend
      args:
        NEXT_PUBLIC_API_URL: "/"
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    volumes:
      - /opt/confidant/app/infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/confidant/data/caddy/data:/data
      - /opt/confidant/data/caddy/config:/config
    depends_on:
      - backend
      - frontend
